<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regalia — Dashboard</title>
    <meta name="description" content="Regalia Dashboard — Intelligent Platform">
    <!-- Google Symbols icon font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            corePlugins: {
                preflight: false,
            }
        }
    </script>
    <style>
        /* Glassmorphism and specific gradients custom utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .glass-input {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            height: 50px !important;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.4) !important;
            border-color: rgba(255, 255, 255, 0.25) !important;
            outline: none !important;
            box-shadow: none !important;
        }

        .glass-input-group {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            height: 50px !important;
            transition: all 0.3s ease;
        }
        
        /* intl-tel-input Glassmorphism Overrides */
        .iti { width: 100%; display: block !important; }
        .iti__dropdown-content {
            background: rgba(15, 17, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 0.75rem !important;
            color: white !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5) !important;
            margin-top: 5px;
        }
        .iti__search-input {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 0.5rem;
        }
        .iti__country { padding: 10px 15px !important; }
        .iti__country.iti__highlight { background-color: rgba(255, 255, 255, 0.1) !important; }
        .iti__selected-dial-code { color: white !important; }
        .iti__arrow { border-top-color: rgba(255,255,255,0.7) !important; }
        .iti__arrow--up { border-bottom-color: rgba(255,255,255,0.7) !important; }

        .glass-button-social {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-button-social:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .bg-gradient-primary-btn {
            background: linear-gradient(135deg, #0f9d58, #0b8043);
            box-shadow: 0 4px 15px rgba(15, 157, 88, 0.3);
        }
        .bg-gradient-primary-btn:hover {
            background: linear-gradient(135deg, #12b767, #0f9d58);
            box-shadow: 0 6px 20px rgba(15, 157, 88, 0.4);
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
